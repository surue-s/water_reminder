<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Water Reminder</title>
  <link rel="stylesheet" href="styles.css" />
  <script type="module" src="/main.js" defer></script>
</head>
<body>
  <div class="app">

    <header>
      <h1>Water Reminder</h1>
      <p class="date" id="today-date"></p>
    </header>

    <section class="progress-section">
      <div class="circle">
        <span id="current-ml">0</span>
        <small>ml</small>
      </div>
      <p>of <strong id="goal-ml">2000</strong>ml daily goal</p>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </section>

    <section class="buttons-section">
      <button id="btn-150">☕ 150ml</button>
      <button id="btn-250">🥛 250ml</button>
      <button id="btn-500">🍶 500ml</button>
      <button id="btn-custom" class="custom-btn">+ Custom</button>
    </section>

    <section class="log-section">
      <h2>Today's Log</h2>
      <ul id="log-list"></ul>
    </section>

  </div>
</body>
</html>
